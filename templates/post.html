{% extends "base.html" %}

{% block content %}
<h2>{{ post.title }}</h2>
<p>{{ post.content }}</p>
{% if user and post.author_id == user.id %}
    <a href="/posts/{{ post.id }}/edit">Edit</a>

    <form method="post" action="/posts/{{ post.id }}/delete">
        <button type="submit">Delete</button>
    </form>
{% endif %}
<a href="/">← Back</a>
{% endblock %}
